{% extends "base.html" %}
{% block title %}Daftar{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 460px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="card-title mb-1">Daftar Akun</h3>
            <p class="text-muted mb-4">Buat akun untuk mulai memakai sistem rekomendasi.</p>

            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label for="nama" class="form-label">Nama</label>
                    <input type="text" class="form-control" id="nama" name="nama"
                           placeholder="Nama kamu" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="nama@email.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Minimal 4 karakter" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Daftar</button>
            </form>

            <hr class="my-4">
            <p class="text-center mb-0">
                Sudah punya akun? <a href="{{ url_for('login') }}">Login di sini</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
