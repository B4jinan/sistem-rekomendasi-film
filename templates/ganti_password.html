{% extends "base.html" %}
{% block title %}Ganti Password{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 460px;">
    <a href="{{ url_for('profil.edit_akun') }}" class="btn btn-link px-0 mb-2">&larr; Kembali</a>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="card-title mb-4">Ganti Password</h4>
            <form method="POST" action="{{ url_for('profil.ganti_password') }}">
                <div class="mb-3">
                    <label for="password_lama" class="form-label">Password Lama</label>
                    <input type="password" class="form-control" id="password_lama"
                           name="password_lama" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password_baru" class="form-label">Password Baru</label>
                    <input type="password" class="form-control" id="password_baru"
                           name="password_baru" placeholder="Minimal 4 karakter" required>
                </div>
                <div class="mb-3">
                    <label for="password_konfirmasi" class="form-label">Konfirmasi Password Baru</label>
                    <input type="password" class="form-control" id="password_konfirmasi"
                           name="password_konfirmasi" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Simpan</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
