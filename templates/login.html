{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 460px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="card-title mb-1">Login</h3>
            <p class="text-muted mb-4">Masuk untuk mendapatkan rekomendasi film.</p>

            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="nama@email.com" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Masuk</button>
            </form>

            <hr class="my-4">
            <p class="text-center mb-0">
                Belum punya akun? <a href="{{ url_for('auth.register') }}">Daftar di sini</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
